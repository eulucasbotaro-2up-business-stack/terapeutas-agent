<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>O Alquimista Interior - Chat de Teste</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a1628; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
.header { background: #1a2a4a; padding: 16px 24px; text-align: center; border-bottom: 1px solid #2a3a5a; }
.header h1 { font-size: 18px; color: #c9a84c; }
.header p { font-size: 12px; color: #888; margin-top: 4px; }
.chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.msg { max-width: 80%; padding: 12px 16px; border-radius: 16px; line-height: 1.5; font-size: 15px; white-space: pre-wrap; }
.msg.user { align-self: flex-end; background: #1a5c3a; border-bottom-right-radius: 4px; }
.msg.bot { align-self: flex-start; background: #1e2d4a; border-bottom-left-radius: 4px; }
.msg img.preview-img { max-width: 280px; max-height: 200px; border-radius: 8px; margin-bottom: 8px; display: block; }
.msg .file-badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.1); padding: 6px 12px; border-radius: 8px; font-size: 13px; margin-bottom: 8px; }
.msg .file-badge .file-icon { font-size: 18px; }
.typing { align-self: flex-start; background: #1e2d4a; padding: 12px 20px; border-radius: 16px; font-size: 14px; color: #888; }
.input-area { background: #1a2a4a; padding: 16px; display: flex; gap: 8px; border-top: 1px solid #2a3a5a; align-items: flex-end; }
.input-area input[type="text"] { flex: 1; padding: 12px 16px; border-radius: 24px; border: 1px solid #2a3a5a; background: #0a1628; color: #e0e0e0; font-size: 15px; outline: none; }
.input-area input[type="text"]:focus { border-color: #c9a84c; }
.input-area button { padding: 12px; border-radius: 50%; border: none; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 44px; height: 44px; }
.input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
#btn-upload { background: #2a3a5a; color: #c9a84c; }
#btn-upload:hover { background: #3a4a6a; }
#send { background: #c9a84c; color: #0a1628; font-weight: bold; }
#send:hover { background: #d4b35c; }

/* Preview de arquivo selecionado */
.file-preview-bar { display: none; background: #1a2a4a; padding: 8px 16px; border-top: 1px solid #2a3a5a; align-items: center; gap: 12px; }
.file-preview-bar.active { display: flex; }
.file-preview-bar .preview-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; background: #2a3a5a; display: flex; align-items: center; justify-content: center; font-size: 22px; }
.file-preview-bar .preview-thumb img { width: 100%; height: 100%; border-radius: 8px; object-fit: cover; }
.file-preview-bar .preview-info { flex: 1; }
.file-preview-bar .preview-info .name { font-size: 13px; color: #e0e0e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
.file-preview-bar .preview-info .size { font-size: 11px; color: #888; }
.file-preview-bar .btn-cancel { background: none; border: none; color: #ff6b6b; font-size: 20px; cursor: pointer; padding: 4px 8px; }
</style>
</head>
<body>
<div class="header">
  <h1>O Alquimista Interior</h1>
  <p>Chat de teste - Escola de Alquimia do Joel Aleixo</p>
</div>
<div class="chat" id="chat">
  <div class="msg bot">Bem-vindo ao teste do agente. Mande uma pergunta sobre alquimia, elementos, protocolos ou qualquer tema dos materiais do Joel.</div>
</div>
<div class="file-preview-bar" id="file-preview-bar">
  <div class="preview-thumb" id="preview-thumb"></div>
  <div class="preview-info">
    <div class="name" id="preview-name"></div>
    <div class="size" id="preview-size"></div>
  </div>
  <button class="btn-cancel" onclick="cancelarArquivo()" title="Cancelar">&times;</button>
</div>
<div class="input-area">
  <input type="file" id="file-input" hidden accept="image/jpeg,image/png,image/webp,image/gif,.pdf,.mp3,.ogg,.wav,.m4a">
  <button id="btn-upload" onclick="document.getElementById('file-input').click()" title="Enviar arquivo">&#128206;</button>
  <input type="text" id="input" placeholder="Digite sua pergunta..." autofocus>
  <button id="send" onclick="enviar()">&#10148;</button>
</div>
<script>
const API = window.location.origin;
const TERAPEUTA_ID = '5085ff75-fe00-49fe-95f4-a5922a0cf179';
const SESSION_ID = 'session_' + Math.random().toString(36).substr(2, 9);
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('send');
const fileInput = document.getElementById('file-input');
const filePreviewBar = document.getElementById('file-preview-bar');
const previewThumb = document.getElementById('preview-thumb');
const previewName = document.getElementById('preview-name');
const previewSize = document.getElementById('preview-size');

let arquivoSelecionado = null;

input.addEventListener('keypress', e => { if (e.key === 'Enter') enviar(); });

// Quando selecionar arquivo
fileInput.addEventListener('change', function() {
  const file = this.files[0];
  if (!file) return;

  arquivoSelecionado = file;

  // Mostrar barra de preview
  filePreviewBar.classList.add('active');
  previewName.textContent = file.name;
  previewSize.textContent = formatarTamanho(file.size);

  // Mostrar thumbnail ou icone
  previewThumb.innerHTML = '';
  if (file.type.startsWith('image/')) {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(file);
    previewThumb.appendChild(img);
  } else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) {
    previewThumb.textContent = '\uD83D\uDCC4';
  } else {
    previewThumb.textContent = '\uD83C\uDFA4';
  }

  input.placeholder = 'Adicione uma mensagem (opcional)...';
  input.focus();
});

function cancelarArquivo() {
  arquivoSelecionado = null;
  fileInput.value = '';
  filePreviewBar.classList.remove('active');
  previewThumb.innerHTML = '';
  input.placeholder = 'Digite sua pergunta...';
}

function formatarTamanho(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / 1048576).toFixed(1) + ' MB';
}

async function enviar() {
  const texto = input.value.trim();

  // Se nao tem texto NEM arquivo, nao envia
  if (!texto && !arquivoSelecionado) return;

  // Desabilitar botoes
  sendBtn.disabled = true;
  document.getElementById('btn-upload').disabled = true;

  if (arquivoSelecionado) {
    // === ENVIO COM ARQUIVO ===
    const file = arquivoSelecionado;
    const msgTexto = texto || '';

    // Mostrar mensagem do usuario com preview
    addMsgComArquivo(file, msgTexto, 'user');

    input.value = '';
    cancelarArquivo();

    // Mostrar "digitando..."
    const typing = document.createElement('div');
    typing.className = 'typing';
    if (file.type.startsWith('image/')) {
      typing.textContent = 'O Alquimista esta analisando a imagem...';
    } else if (file.name.endsWith('.pdf')) {
      typing.textContent = 'O Alquimista esta lendo o documento...';
    } else {
      typing.textContent = 'O Alquimista esta transcrevendo o audio...';
    }
    chat.appendChild(typing);
    chat.scrollTop = chat.scrollHeight;

    try {
      const formData = new FormData();
      formData.append('arquivo', file);
      formData.append('session_id', SESSION_ID);
      formData.append('terapeuta_id', TERAPEUTA_ID);
      formData.append('mensagem', msgTexto);

      const res = await fetch(API + '/teste/upload', {
        method: 'POST',
        body: formData,
      });
      const data = await res.json();
      typing.remove();

      if (data.resposta) {
        addMsg(data.resposta, 'bot');
        // Se teve transcricao de audio, mostrar
        if (data.transcricao) {
          addMsg('[Transcricao do audio]\n' + data.transcricao, 'bot');
        }
      } else {
        addMsg('Erro: ' + JSON.stringify(data), 'bot');
      }
    } catch (err) {
      typing.remove();
      addMsg('Erro de conexao: ' + err.message, 'bot');
    }

  } else {
    // === ENVIO NORMAL (texto) ===
    addMsg(texto, 'user');
    input.value = '';

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.textContent = 'O Alquimista esta consultando os materiais...';
    chat.appendChild(typing);
    chat.scrollTop = chat.scrollHeight;

    try {
      const res = await fetch(API + '/teste/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ terapeuta_id: TERAPEUTA_ID, mensagem: texto, session_id: SESSION_ID })
      });
      const data = await res.json();
      typing.remove();

      if (data.resposta) {
        addMsg(data.resposta, 'bot');
      } else {
        addMsg('Erro: ' + JSON.stringify(data), 'bot');
      }
    } catch (err) {
      typing.remove();
      addMsg('Erro de conexao: ' + err.message, 'bot');
    }
  }

  sendBtn.disabled = false;
  document.getElementById('btn-upload').disabled = false;
  input.focus();
}

function addMsg(texto, tipo) {
  const div = document.createElement('div');
  div.className = 'msg ' + tipo;
  div.textContent = texto;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function addMsgComArquivo(file, texto, tipo) {
  const div = document.createElement('div');
  div.className = 'msg ' + tipo;

  // Se e imagem, mostrar preview
  if (file.type.startsWith('image/')) {
    const img = document.createElement('img');
    img.className = 'preview-img';
    img.src = URL.createObjectURL(file);
    div.appendChild(img);
  } else {
    // Badge com icone e nome do arquivo
    const badge = document.createElement('div');
    badge.className = 'file-badge';
    const icon = document.createElement('span');
    icon.className = 'file-icon';
    icon.textContent = file.name.endsWith('.pdf') ? '\uD83D\uDCC4' : '\uD83C\uDFA4';
    badge.appendChild(icon);
    badge.appendChild(document.createTextNode(file.name));
    div.appendChild(badge);
  }

  // Texto adicional
  if (texto) {
    const p = document.createElement('div');
    p.textContent = texto;
    p.style.marginTop = '4px';
    div.appendChild(p);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}
</script>
</body>
</html>
