# docker-compose.yml — Ambiente de desenvolvimento local
# Sobe o FastAPI + Evolution API juntos

version: "3.8"

services:
  # Backend FastAPI (agente IA)
  app:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    env_file:
      - .env
    restart: on-failure
    depends_on:
      - evolution-api

  # Evolution API (WhatsApp — self-hosted)
  evolution-api:
    image: atendai/evolution-api:v2.2.3
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-seu_api_key_aqui}
      - DATABASE_ENABLED=false
    restart: on-failure
